<!--
Crie um objeto chamado paciente com as propriedades peso (80) e altura (1.80). 
Crie um método chamado calcularIMC que executa a fórmula do IMC (peso/(altura×altura)). 
Chame o método na função e coloque o resultado na tela de forma organizada.
-->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>3B - Exercício: IMC</title>
</head>

<body>
    <h2>Exercício 3B: IMC do Paciente</h2>
    <p id="texto">Peso: 80kg | Altura: 1.80m</p>
    <button onclick="mostrarIMC()">Calcular IMC</button>
    <p id="txtIMC">IMC: ---</p>
    <img src="https://lh4.googleusercontent.com/proxy/AoLxdW6n96JG-yBf68h9D1uS7zgmIXVgWsyrslSVDN4iAjdFtcAZu-ZFyQHoarTunzJZYGArD9OhFRaTZhN196idh9pofGA573b7tmpQWXY_I07GGyQAfeJvLw" alt="">

    <script>
        //Crie o objeto 'paciente' e o método 'calcularIMC'
        const paciente = {
            peso: 80,
            altura: 1.80,
            calcularIMC: function () {
                return this.peso / (this.altura * this.altura)
            }
        }
        //Pegue o retorno do cálculo do objeto e exiba em 'txtIMC' usando .toFixed(1)

        document.getElementById('texto').innerHTML = `Peso: ${paciente.peso}kg | Altura: ${paciente.altura}m`
        function mostrarIMC(){
            let resultado = paciente.calcularIMC()
            document.getElementById('txtIMC').innerHTML = `resultado: ${resultado.toFixed(1)}`
        }

    </script>
</body>

</html>
